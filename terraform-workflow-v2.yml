name: terraform-reusable-workflow-v2

env:
  GITHUB_APP_ID: ${{ vars.BCH_APP_ID }}
  GITHUB_APP_INSTALLATION_ID: ${{ vars.BCH_APP_INSTALLATION_ID }}
  GITHUB_APP_PEM_FILE: ${{ secrets.BCH_APP_PEM_FILE }}
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_WORKSPACE: ${{ inputs.tfc_workspace }}

on:
  workflow_call:
    inputs:
      workload_runtime:
        type: string
        required: true
        description: Runtime selector used to pick the matching tf-providers/tf-vars file.
      tf_working_dir:
        type: string
        required: true
        description: Directory from which to run Terraform.
      tf_version:
        type: string
        required: false
        default: '1.10'
        description: Terraform binary version.
      tf_provider_dir:
        type: string
        required: false
        default: 'tf-providers'
        description: Directory holding per-runtime provider files, relative to tf_working_dir.
      tf_vars_dir:
        type: string
        required: false
        default: 'tf-vars'
        description: Directory holding per-runtime vars files, relative to tf_working_dir.
      tfc_workspace:
        type: string
        required: false
        default: ''
        description: Terraform Cloud workspace name. Used when the consumer's cloud {} block leaves workspaces empty.
      environment:
        type: string
        required: true
        description: GitHub Actions environment used for approval gating.
      artifact_name:
        type: string
        required: false
        description: Artifact name to download.
      artifact_download_path:
        type: string
        required: false
        description: Path to download the artifact to.
      has_template_subdir:
        type: string
        required: false
        default: 'false'
        description: Set true to apply a ./templates subdirectory first (code-generation workflows).
      force_main_branch:
        type: string
        required: false
        default: 'false'
        description: Allow apply on main without a tag.

permissions:
  contents: read

jobs:
  setup-env-for-deploy:
    name: Setup env for ${{ inputs.workload_runtime }} deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}
    outputs:
      provider-file: ${{ steps.generate-deploy-run-vars.outputs.provider-file }}
      tf-vars-file: ${{ steps.generate-deploy-run-vars.outputs.tf-vars-file }}
    steps:
      - name: Checkout Src
        uses: actions/checkout@v4

      - name: Generate Deploy TF Run Vars & Providers
        id: generate-deploy-run-vars
        env:
          TF_PROVIDER_FILE_QUERY: "${{ inputs.tf_provider_dir }}/${{ inputs.workload_runtime }}*.tf"
          TF_VARS_FILE_QUERY: "${{ inputs.tf_vars_dir }}/${{ inputs.workload_runtime }}*.tf"
        shell: bash --noprofile --norc -e -o pipefail {0}
        run: |
            # $1 is an intentional glob (e.g. tf-providers/non-prod*.tf); it must stay unquoted to expand.
            number_of_files_in_dir () {
              # shellcheck disable=SC2005,SC2012,SC2046,SC2086
              echo $(ls -1p $1 | wc -l | xargs)
            }

            get_files_in_dir_to_list () {
              local sed_results
              # shellcheck disable=SC2010,SC2012,SC2086
              sed_results=$(ls -1p $1 | grep / | sed 's/$/\\", /g' | sed 's/^/\\"/g' | xargs echo | sed 's/,$//g')
              echo "${sed_results}"
            }

            echo "Enumerating tf providers/variables"
            NUMBER_OF_PROVIDERS=$(number_of_files_in_dir "${TF_PROVIDER_FILE_QUERY}")

            if [[ $NUMBER_OF_PROVIDERS != 1 ]]; then
              echo "ERROR: Expected 1 providers but found ${NUMBER_OF_PROVIDERS}"
              exit 1
            fi

            PROVIDER_FILES=$(get_files_in_dir_to_list "${TF_PROVIDER_FILE_QUERY}")

            NUMBER_OF_TF_VAR_FILES=$(number_of_files_in_dir "${TF_VARS_FILE_QUERY}")

            if [[ $NUMBER_OF_TF_VAR_FILES != 1 ]]; then
              echo "ERROR: Expected 1 tf_var file but found ${NUMBER_OF_TF_VAR_FILES}"
              exit 1
            fi

            TF_VAR_FILES=$(get_files_in_dir_to_list "${TF_VARS_FILE_QUERY}")

            echo "provider-file=${PROVIDER_FILES}" >> "$GITHUB_OUTPUT"
            echo "tf-vars-file=${TF_VAR_FILES}" >> "$GITHUB_OUTPUT"

            echo "Providers found = ${PROVIDER_FILES}"
            echo "TF Vars found = ${TF_VAR_FILES}"

  terraform-checks:
    needs: setup-env-for-deploy
    name: terraform checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}
    steps:
      - name: setup terraform to ensure desired version ${{ inputs.tf_version }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Checkout Src
        uses: actions/checkout@v4

      - name: get token for cloning modules during terraform init
        id: get-mod-reader-token
        uses: actions/create-github-app-token@v1
        with:
          private-key: ${{ secrets.BCH_APP_PEM_FILE }}
          app-id: ${{ vars.BCH_APP_ID }}
          owner: ${{ github.repository_owner }}

      - name: git config
        shell: bash --noprofile --norc -e -o pipefail {0}
        run: |
          echo "https://x-access-token:${{ steps.get-mod-reader-token.outputs.token }}@github.com/" > ~/.git-credentials
          git config --global credential.helper store
          git config --global --replace-all url.https://github.com/.insteadOf ssh://git@github.com/
          git config --global --add url.https://github.com/.insteadOf git@github.com:

      - name: Add provider and tf vars for runtime
        run: |
          cp -v ${{ needs.setup-env-for-deploy.outputs.provider-file }} .
          cp -v ${{ needs.setup-env-for-deploy.outputs.tf-vars-file }} .

      - name: Checkout Checkov config from reusable workflows repository
        uses: actions/checkout@v4
        with:
          repository: BCH-CloudAzure/bch-reusable-workflows
          ref: v1
          token: ${{ steps.get-mod-reader-token.outputs.token }}
          path: repos/bch-reusable-workflows
          sparse-checkout: |
            checkov

      - name: Run Checkov action
        id: checkov
        # Soft-fail on feature pushes; hard-fail on PR/main.
        continue-on-error: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
        uses: bridgecrewio/checkov-action@v12.3102.0
        with:
          directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}
          download_external_modules: false
          framework: terraform
          quiet: true
          log_level: WARNING
          output_format: cli
          output_file_path: ${{ github.workspace }}/${{ github.run_id }}-${{ github.run_number }}-checkov-results.txt
          config_file: ${{ github.workspace }}/repos/bch-reusable-workflows/checkov/config.yml

      - name: Get artifact name
        id: artifact_name_checkov
        uses: BCH-CloudAzure/bch-reusable-workflows/.github/actions/get-artifact-name@v1
        with:
          artifact_type: "checkov"
          tf_working_dir: ${{ inputs.tf_working_dir }}
          environment:  ${{ inputs.environment }}

      - name: Upload Checkov result
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results-${{ steps.artifact_name_checkov.outputs.artifact_name }}
          path: ${{ github.workspace }}/${{ github.run_id }}-${{ github.run_number }}-checkov-results.txt

      - name: terraform fmt check
        id: fmt
        run: terraform fmt -check

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint init
        env:
          GITHUB_TOKEN: ${{ steps.get-mod-reader-token.outputs.token }}
        run: tflint --init

      - name: tflint
        run: tflint --recursive --format compact

      - name: terraform init for templating state
        id: init-for-templating
        run: terraform init -backend=false
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: Terraform apply (to generate code from template)
        id: template-apply
        run: set -o pipefail && terraform apply -auto-approve -no-color
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: terraform init for checks
        id: init-for-checks
        run: terraform init -backend=false

      - name: terraform validate
        id: validate
        run: terraform validate

  terraform-plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs:
      - setup-env-for-deploy
      - terraform-checks
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}
    steps:
      - name: setup terraform to ensure desired version
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Checkout Src
        uses: actions/checkout@v4

      - name: get token for cloning modules during terraform init
        id: get-mod-reader-token
        uses: actions/create-github-app-token@v1
        with:
          private-key: ${{ secrets.BCH_APP_PEM_FILE }}
          app-id: ${{ vars.BCH_APP_ID }}
          owner: ${{ github.repository_owner }}

      - name: git config
        shell: bash --noprofile --norc -e -o pipefail {0}
        run: |
          echo "https://x-access-token:${{ steps.get-mod-reader-token.outputs.token }}@github.com/" > ~/.git-credentials
          git config --global credential.helper store
          git config --global --replace-all url.https://github.com/.insteadOf ssh://git@github.com/
          git config --global --add url.https://github.com/.insteadOf git@github.com:

      - name: Add provider and tf vars for runtime
        run: |
          cp -v ${{ needs.setup-env-for-deploy.outputs.provider-file }} .
          cp -v ${{ needs.setup-env-for-deploy.outputs.tf-vars-file }} .

      - name: terraform init for templating state
        id: init-for-templating
        run: terraform init -backend=false
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: Terraform apply (to generate code from template)
        id: template-apply
        run: set -o pipefail && terraform apply -auto-approve -no-color
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: terraform init
        id: init
        run: terraform init

      - name: retrieve designated artifact
        if: inputs.artifact_name != '' && inputs.artifact_download_path != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_download_path }}

      - name: terraform plan
        id: plan
        run: set -o pipefail && terraform plan -detailed-exitcode -no-color | tee ${{ github.workspace }}/tfplan-out.${{ github.run_id }}.${{ github.run_number }}.log
        continue-on-error: true

      - name: Get artifact name
        id: artifact_name_plan
        uses: BCH-CloudAzure/bch-reusable-workflows/.github/actions/get-artifact-name@v1
        with:
          artifact_type: "plan"
          tf_working_dir: ${{ inputs.tf_working_dir }}
          environment:  ${{ inputs.environment }}

      - name: Archive Plan Result
        id: archiveplan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-output-${{ steps.artifact_name_plan.outputs.artifact_name }}
          path: ${{ github.workspace }}/tfplan-out.${{ github.run_id }}.${{ github.run_number }}.log

      - name: Check for Plan Failure
        if: steps.plan.outputs.exitcode == 1
        run: exit 1

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}

  terraform-apply:
    if: needs.terraform-plan.outputs.plan_exit_code == '2' && ((inputs.force_main_branch == 'true' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v'))
    name: terraform apply
    runs-on: ubuntu-latest
    needs:
      - setup-env-for-deploy
      - terraform-plan
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}

    steps:
      - name: setup terraform to ensure desired version
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Checkout Src
        uses: actions/checkout@v4

      - name: get token for cloning modules during terraform init
        id: get-mod-reader-token
        uses: actions/create-github-app-token@v1
        with:
          private-key: ${{ secrets.BCH_APP_PEM_FILE }}
          app-id: ${{ vars.BCH_APP_ID }}
          owner: ${{ github.repository_owner }}

      - name: git config
        shell: bash --noprofile --norc -e -o pipefail {0}
        run: |
          echo "https://x-access-token:${{ steps.get-mod-reader-token.outputs.token }}@github.com/" > ~/.git-credentials
          git config --global credential.helper store
          git config --global --replace-all url.https://github.com/.insteadOf ssh://git@github.com/
          git config --global --add url.https://github.com/.insteadOf git@github.com:

      - name: Add provider and tf vars for runtime
        run: |
          cp -v ${{ needs.setup-env-for-deploy.outputs.provider-file }} .
          cp -v ${{ needs.setup-env-for-deploy.outputs.tf-vars-file }} .

      - name: terraform init for templating state
        id: init-for-templating
        run: terraform init -backend=false
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: Terraform apply (to generate code from template)
        id: template-apply
        run: set -o pipefail && terraform apply -auto-approve -no-color
        working-directory: ${{ github.workspace }}/${{ inputs.tf_working_dir }}/templates
        if: inputs.has_template_subdir == 'true'

      - name: terraform init
        id: init
        run: terraform init

      - name: retrieve designated artifact
        if: inputs.artifact_name != '' && inputs.artifact_download_path != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_download_path }}

      - name: Terraform apply
        id: apply
        run: set -o pipefail && terraform apply -auto-approve -no-color | tee ${{ github.workspace }}/tfapply-out.${{ github.run_id }}.${{ github.run_number }}.log

      - name: Get artifact name
        id: artifact_name_apply
        uses: BCH-CloudAzure/bch-reusable-workflows/.github/actions/get-artifact-name@v1
        with:
          artifact_type: "apply"
          tf_working_dir: ${{ inputs.tf_working_dir }}
          environment:  ${{ inputs.environment }}

      - name: Archive Apply Result
        id: archiveapply
        uses: actions/upload-artifact@v4
        with:
          name: tf-apply-output-${{ steps.artifact_name_apply.outputs.artifact_name }}
          path: ${{ github.workspace }}/tfapply-out.${{ github.run_id }}.${{ github.run_number }}.log
